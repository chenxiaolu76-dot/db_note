site_name: 数据库笔记
site_description: 数据库课程笔记与课件整理
site_url: "https://chenxiaolu76-dot.github.io/db_note/"
repo_url: "https://github.com/chenxiaolu76-dot/db_note"
repo_name: "chenxiaolu76-dot/db_note"
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: teal
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/mermaid.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js

nav:
  - 首页: index.md
  - 课程笔记:
      - Lecture 1 · Introduction & Relational Model: notes/lecture1-introduction-relational-model.md
      - Lecture 1 · 思维导图: notes/lecture1-mindmap.md
      - Lecture 2 · SQL(1): notes/lecture2-sql1.md
      - Lecture 2 · 思维导图: notes/lecture2-mindmap.md
      - Lecture 3 · ER Model: notes/lecture3-er-model.md
      - Lecture 3 · 思维导图: notes/lecture3-mindmap.md
      - Lecture 4 · Relational Database Design: notes/lecture4-relational-database-design.md
      - Lecture 4 · 思维导图: notes/lecture4-mindmap.md
      - Lecture 5 · Storage: notes/lecture5-storage.md
      - Lecture 5 · 思维导图: notes/lecture5-mindmap.md
      - Lecture 6 · Tree Indices: notes/lecture6-tree-indices.md
      - Lecture 6 · 思维导图: notes/lecture6-mindmap.md
      - Lecture 7 · Hash Indices: notes/lecture7-hash-indices.md
      - Lecture 7 · 思维导图: notes/lecture7-mindmap.md
      - Lecture 8 · Query Processing: notes/lecture8-query-processing.md
      - Lecture 8 · 思维导图: notes/lecture8-mindmap.md
      - Lecture 9 · Query Optimization: notes/lecture9-query-optimization.md
      - Lecture 9 · 思维导图: notes/lecture9-mindmap.md
      - Lecture 10 · Transactions: notes/lecture10-transactions.md
      - Lecture 10 · 思维导图: notes/lecture10-mindmap.md
      - Lecture 11 · Concurrency Control: notes/lecture11-concurrency-control.md
      - Lecture 11 · 思维导图: notes/lecture11-mindmap.md
      - Lecture 12 · Recovery: notes/lecture12-recovery.md
      - Lecture 12 · 思维导图: notes/lecture12-mindmap.md
      - Final Review: notes/finalreview.md
      - Final Review · 思维导图: notes/finalreview-mindmap.md
      - 思维导图风格示例: notes/mindmap-style-sample.md
  - 新增笔记模板: notes/_template.md
